<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Elevate Theme Docs</title>
    <link rel="stylesheet" href="./elevate.min.css">
    <script src="./elevate.min.js" defer></script>
  </head>
  <body>
    <header class="header">
      <div class="brand">
        Elevate <span style="color: var(--text-accent); margin-left: 0.25rem;">Theme</span>
      </div>
    </header>
    <div class="sidenav">
      <button class="expand-btn" type="button">&laquo;</button>
      <button class="link active" type="button" data-page="overview">Overview</button>
      <button class="link" type="button" data-page="typography">Typography</button>
      <button class="link" type="button" data-page="navigation">Navigation</button>
      <button class="link" type="button" data-page="buttons">Buttons</button>
      <button class="link" type="button" data-page="cards">Cards</button>
      <button class="link" type="button" data-page="forms">Forms</button>
      <button class="link" type="button" data-page="badge">Badge</button>
      <button class="link" type="button" data-page="learning-path">Learning Path</button>
      <button class="link" type="button" data-page="progress-bar">Progress Bar</button>
      <button class="link" type="button" data-page="leaderboard">Leaderboard</button>
      <button class="link" type="button" data-page="mastery-ring">Mastery Ring</button>
    </div>

    <main class="main-content">
      <section class="docs-main stack-lg" id="docs-content" aria-live="polite">
        <div class="docs-loader">Loading Getting Started...</div>
      </section>
    </main>

    <script type="module">
      import { getPageFromUrl, setPageInUrl } from "./page-state.js";

      const content = document.querySelector("#docs-content");
      const navButtons = [...document.querySelectorAll("[data-page]")];
      const pageCache = new Map();
      const defaultPage = "getting-started";

      function setActiveButton(page) {
        navButtons.forEach((button) => {
          const isActive = button.dataset.page === page;
          button.classList.toggle("active", isActive);
          button.classList.toggle("is-active", isActive);
        });
      }

      async function loadPage(page, shouldUpdateUrl = true) {
        const resolvedPage = page || defaultPage;
        content.innerHTML = '<div class="docs-loader">Loading...</div>';
        setActiveButton(resolvedPage);

        try {
          if (!pageCache.has(resolvedPage)) {
            const response = await fetch(`./pages/${resolvedPage}.html`, { cache: "no-store" });

            if (!response.ok) {
              throw new Error(`Missing docs page: ${resolvedPage}`);
            }

            pageCache.set(resolvedPage, await response.text());
          }

          content.innerHTML = pageCache.get(resolvedPage);

          if (shouldUpdateUrl) {
            setPageInUrl(resolvedPage);
          }
        } catch (error) {
          content.innerHTML = `
            <nav class="breadcrumb text-title" aria-label="Breadcrumb">
              <a href="?page=overview">Elevate </a>
            </nav>
            <p class="text-lead">Page ${page} unavailable. Go back to the <a class="nav-link" href="?page=overview">Home</a>.</p>
          `;
        }
      }

      navButtons.forEach((button) => {
        button.addEventListener("click", () => {
          loadPage(button.dataset.page);
        });
      });

      window.addEventListener("popstate", () => {
        loadPage(getPageFromUrl(window.location.search, defaultPage), false);
      });

      const initialPage = getPageFromUrl(window.location.search, defaultPage);
      const hasPageParam = new URLSearchParams(window.location.search).has("page");

      if (!hasPageParam) {
        setPageInUrl(initialPage, "replaceState");
      }

      loadPage(initialPage, false);
    </script>
  </body>
</html>
