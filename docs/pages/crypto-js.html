<nav class="breadcrumb text-subtitle" aria-label="Breadcrumb">
  <a href="?page=overview">Elevate</a>
  <span class="breadcrumb-separator">/</span>
  <span aria-current="page">CryptoJS</span>
</nav>

<p class="text-lead">
  Encrypt and decrypt values or JSON payloads with the built-in AES-GCM helper.
</p>

<form class="stack-lg" data-crypto-demo>
  <div class="card">
    <div class="card-header">
      <h3>Shared secret</h3>
    </div>
    <div class="card-body stack">
      <label class="form-group">
        <span class="text-label">Secret</span>
        <input class="input" type="text" data-crypto-secret value="elevate-default-secret" />
      </label>
    </div>
  </div>

  <div class="grid grid-2">
    <div class="card">
      <div class="card-header">
        <h3>Encrypt value</h3>
      </div>
      <div class="card-body stack">
        <label class="form-group">
          <span class="text-label">Plain text</span>
          <input class="input" type="text" data-crypto-input value="hello world" />
        </label>
        <button class="btn btn-primary" type="submit" data-crypto-action="encrypt-value">Encrypt</button>
        <label class="form-group">
          <span class="text-label">Encrypted value</span>
          <textarea class="input" rows="4" data-crypto-output></textarea>
        </label>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <h3>Decrypt value</h3>
      </div>
      <div class="card-body stack">
        <label class="form-group">
          <span class="text-label">Encrypted text</span>
          <textarea class="input" rows="4" data-crypto-decrypt-input></textarea>
        </label>
        <button class="btn btn-secondary" type="submit" data-crypto-action="decrypt-value">Decrypt</button>
        <label class="form-group">
          <span class="text-label">Decrypted value</span>
          <textarea class="input" rows="4" data-crypto-decrypt-output></textarea>
        </label>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <h3>Encrypt JSON</h3>
    </div>
    <div class="card-body stack">
      <label class="form-group">
        <span class="text-label">JSON input</span>
        <textarea class="input" rows="8" data-crypto-json-input>{"name":"Ada","role":"Developer","active":true}</textarea>
      </label>
      <button class="btn btn-accent" type="submit" data-crypto-action="encrypt-json">Encrypt JSON</button>
      <label class="form-group">
        <span class="text-label">Encrypted JSON</span>
        <textarea class="input" rows="8" data-crypto-json-output></textarea>
      </label>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <h3>Decrypt JSON</h3>
    </div>
    <div class="card-body stack">
      <label class="form-group">
        <span class="text-label">Encrypted JSON</span>
        <textarea class="input" rows="8" data-crypto-json-decrypt-input></textarea>
      </label>
      <button class="btn btn-outline" type="submit" data-crypto-action="decrypt-json">Decrypt JSON</button>
      <label class="form-group">
        <span class="text-label">Decrypted JSON</span>
        <textarea class="input" rows="8" data-crypto-json-decrypt-output></textarea>
      </label>
    </div>
  </div>
</form>

<script>

  const form = document.querySelector('[data-crypto-demo]');

  if (!form) {
    return;
  }

  const encryptValueInput = form.querySelector('[data-crypto-input]');
  const encryptValueOutput = form.querySelector('[data-crypto-output]');
  const decryptValueInput = form.querySelector('[data-crypto-decrypt-input]');
  const decryptValueOutput = form.querySelector('[data-crypto-decrypt-output]');
  const encryptJsonInput = form.querySelector('[data-crypto-json-input]');
  const encryptJsonOutput = form.querySelector('[data-crypto-json-output]');
  const decryptJsonInput = form.querySelector('[data-crypto-json-decrypt-input]');
  const decryptJsonOutput = form.querySelector('[data-crypto-json-decrypt-output]');
  const secretInput = form.querySelector('[data-crypto-secret]');

  if (!encryptValueInput || !encryptValueOutput || !decryptValueInput || !decryptValueOutput || !encryptJsonInput || !encryptJsonOutput || !decryptJsonInput || !decryptJsonOutput || !secretInput) {
    return;
  }

  const setMessage = (element, message, isError = false) => {
    element.textContent = message;
    element.style.color = isError ? 'var(--danger-color, #d9534f)' : 'var(--text-secondary)';
  };

  form.addEventListener('submit', async (event) => {
    event.preventDefault();
    const secret = secretInput.value.trim() || 'elevate';
    window.Crypto.init(secret);

    const action = event.submitter?.dataset.cryptoAction;

    if (action === 'encrypt-value') {
      try {
        const encrypted = await window.Crypto.encrypt(encryptValueInput.value, secret);
        encryptValueOutput.value = encrypted;
        setMessage(encryptValueOutput, 'Encrypted value ready.', false);
      } catch (error) {
        setMessage(encryptValueOutput, error.message, true);
      }
      return;
    }

    if (action === 'decrypt-value') {
      try {
        const decrypted = await window.Crypto.decrypt(decryptValueInput.value, secret);
        decryptValueOutput.value = typeof decrypted === 'string' ? decrypted : JSON.stringify(decrypted, null, 2);
        setMessage(decryptValueOutput, 'Decrypted value ready.', false);
      } catch (error) {
        setMessage(decryptValueOutput, error.message, true);
      }
      return;
    }

    if (action === 'encrypt-json') {
      try {
        const encrypted = await window.Crypto.encjson(encryptJsonInput.value, secret);
        encryptJsonOutput.value = encrypted;
        setMessage(encryptJsonOutput, 'Encrypted JSON ready.', false);
      } catch (error) {
        setMessage(encryptJsonOutput, error.message, true);
      }
      return;
    }

    if (action === 'decrypt-json') {
      try {
        const decrypted = await window.Crypto.decjson(decryptJsonInput.value, secret);
        decryptJsonOutput.value = JSON.stringify(decrypted, null, 2);
        setMessage(decryptJsonOutput, 'Decrypted JSON ready.', false);
      } catch (error) {
        setMessage(decryptJsonOutput, error.message, true);
      }
    }
  });
</script>
